<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">ShopBrand</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero Carousel -->
<div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100" alt="Slide 1">
      <div class="carousel-caption d-none d-md-block">
        <h5>Best Products</h5>
        <p>Quality you can trust</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100" alt="Slide 2">
    </div>
    <div class="carousel-item">
      <img src="https://via.placeholder.com/1200x400" class="d-block w-100" alt="Slide 3">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- Product Grid -->
<div class="container my-5">
  <div class="row g-4">
    <!-- Product Card -->
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card position-relative">
        <span class="badge bg-danger position-absolute top-0 end-0 m-2">Sale</span>
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product">
        <div class="card-body">
          <h5 class="card-title">Product 1</h5>
          <p class="card-text">$19.99</p>
          <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal1">Xem nhanh</button>
        </div>
      </div>
    </div>
    <!-- copy 7 product cards -->
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 2</h5><p class="card-text">$25.99</p></div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 3</h5><p class="card-text">$15.50</p></div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 4</h5><p class="card-text">$30.00</p></div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 5</h5><p class="card-text">$18.00</p></div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 6</h5><p class="card-text">$22.00</p></div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 7</h5><p class="card-text">$12.99</p></div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card"><img src="https://via.placeholder.com/300x200" class="card-img-top">
        <div class="card-body"><h5 class="card-title">Product 8</h5><p class="card-text">$28.50</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white py-5">
  <div class="container">
    <div class="row">
      <div class="col-md-3">Company Info</div>
      <div class="col-md-3">Support</div>
      <div class="col-md-3">Services</div>
      <div class="col-md-3">Contact</div>
    </div>
  </div>
</footer>

<!-- Modal -->
<div class="modal fade" id="productModal1
