<!-- boxmodel_lab.html -->

<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Box Model Lab</title>

    <link rel="stylesheet" href="boxmodel.css">

</head>

<body>

    <h1>Box Model Lab</h1>

    <!-- PHẦN 1 -->

    <h2>Phần 1 — Content-box vs Border-box</h2>

    <div class="wrapper">

        <div class="box content-box">

            <h3>Content Box</h3>

            <p>
                width: 300px
            </p>

            <p>
                padding: 20px
            </p>

            <p>
                border: 5px
            </p>

        </div>

        <div class="box border-box">

            <h3>Border Box</h3>

            <p>
                width: 300px
            </p>

            <p>
                padding: 20px
            </p>

            <p>
                border: 5px
            </p>

        </div>

    </div>

    <!-- PHẦN 2 -->

    <h2>Phần 2 — Layout 3 cột</h2>

    <div class="layout-container">

        <div class="sidebar">

            <h3>Sidebar</h3>

            <p>
                width: 250px
            </p>

        </div>

        <div class="content">

            <h3>Content</h3>

            <p>
                width: 500px
            </p>

        </div>

        <div class="ads">

            <h3>Ads</h3>

            <p>
                width: 250px
            </p>

        </div>

    </div>

</body>

</html>
