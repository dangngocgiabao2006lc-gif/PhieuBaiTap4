<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
</head>

<body>

    <h1>Đăng ký tài khoản E-Commerce</h1>

    <form action="#" method="POST">

        <!-- FIELDSET 1 -->
        <fieldset>

            <legend>Thông tin cá nhân</legend>

            <!-- Họ tên -->
            <div>
                <label for="fullname">
                    Họ và tên:
                </label>

                <input
                    type="text"
                    id="fullname"
                    name="fullname"
                    required
                    minlength="2"
                    maxlength="50"
                    placeholder="Nhập họ tên">
            </div>

            <br>

            <!-- Email -->
            <div>
                <label for="email">
                    Email:
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="example@gmail.com">
            </div>

            <br>

            <!-- SĐT -->
            <div>
                <label for="phone">
                    Số điện thoại:
                </label>

                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    pattern="[0-9]{10}"
                    placeholder="0901234567"
                    required>
            </div>

            <br>

            <!-- Ngày sinh -->
            <div>
                <label for="dob">
                    Ngày sinh:
                </label>

                <input
                    type="date"
                    id="dob"
                    name="dob"
                    max="2026-05-23"
                    required
                    placeholder="Chọn ngày sinh">
            </div>

        </fieldset>

        <br>

        <!-- FIELDSET 2 -->
        <fieldset>

            <legend>Tài khoản</legend>

            <!-- Username -->
            <div>
                <label for="username">
                    Username:
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    pattern="[A-Za-z0-9_]{3,20}"
                    placeholder="Nhập username"
                    required>
            </div>

            <br>

            <!-- Password -->
            <div>
                <label for="password">
                    Password:
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    minlength="8"
                    pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                    placeholder="Nhập password"
                    required
                    title="Ít nhất 8 ký tự, gồm 1 chữ hoa và 1 số">
            </div>

            <br>

            <!-- Confirm Password -->
            <div>
                <label for="confirmPassword">
                    Xác nhận Password:
                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    minlength="8"
                    pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                    placeholder="Nhập lại password"
                    required
                    title="Ít nhất 8 ký tự, gồm 1 chữ hoa và 1 số">
            </div>

        </fieldset>

        <br>

        <!-- FIELDSET 3 -->
        <fieldset>

            <legend>Thông tin giao hàng</legend>

            <!-- Thành phố -->
            <div>
                <label for="city">
                    Thành phố:
                </label>

                <select
                    id="city"
                    name="city"
                    required>

                    <option value="">
                        -- Chọn thành phố --
                    </option>

                    <option value="HaNoi">
                        Hà Nội
                    </option>

                    <option value="HCM">
                        TP.HCM
                    </option>

                    <option value="DaNang">
                        Đà Nẵng
                    </option>

                    <option value="HaiPhong">
                        Hải Phòng
                    </option>

                    <option value="CanTho">
                        Cần Thơ
                    </option>

                </select>
            </div>

            <br>

            <!-- Quận huyện -->
            <div>
                <label for="district">
                    Quận/Huyện:
                </label>

                <select
                    id="district"
                    name="district"
                    required>

                    <option value="">
                        -- Chọn quận huyện --
                    </option>

                    <option value="HaDong">
                        Hà Đông
                    </option>

                    <option value="ThanhXuan">
                        Thanh Xuân
                    </option>

                    <option value="CauGiay">
                        Cầu Giấy
                    </option>

                    <option value="DongDa">
                        Đống Đa
                    </option>

                </select>
            </div>

            <br>

            <!-- Địa chỉ -->
            <div>
                <label for="address">
                    Địa chỉ chi tiết:
                </label>

                <br>

                <textarea
                    id="address"
                    name="address"
                    rows="3"
                    placeholder="Nhập địa chỉ chi tiết"
                    required></textarea>
            </div>

            <br>

            <!-- Giới tính -->
            <div>

                <p>Giới tính:</p>

                <input
                    type="radio"
                    id="male"
                    name="gender"
                    value="Nam"
                    required>

                <label for="male">
                    Nam
                </label>

                <br>

                <input
                    type="radio"
                    id="female"
                    name="gender"
                    value="Nữ">

                <label for="female">
                    Nữ
                </label>

                <br>

                <input
                    type="radio"
                    id="other"
                    name="gender"
                    value="Khác">

                <label for="other">
                    Khác
                </label>

            </div>

        </fieldset>

        <br>

        <!-- Điều khoản -->
        <div>

            <input
                type="checkbox"
                id="agree"
                name="agree"
                required>

            <label for="agree">
                Tôi đồng ý với điều khoản sử dụng
            </label>

        </div>

        <br>

        <!-- Buttons -->
        <button type="submit">
            Đăng ký
        </button>

        <button type="reset">
            Reset
        </button>

    </form>

</body>

</html>
