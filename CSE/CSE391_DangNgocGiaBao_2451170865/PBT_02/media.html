<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Page</title>
</head>

<body>

    <h1>Trang giới thiệu sản phẩm</h1>

    <!-- Ảnh sản phẩm -->

    <h2>Danh sách sản phẩm</h2>

    <!-- Figure 1 -->
    <figure>

        <img
            src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=1200&auto=format&fit=crop"
            alt="iPhone 16 Pro Max màu Titan"
            loading="lazy"
            style="max-width: 100%; height: auto;">

        <figcaption>
            iPhone 16 Pro Max - 25.990.000đ
        </figcaption>

    </figure>

    <br>

    <!-- Figure 2 -->
    <figure>

        <img
            src="https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1200&auto=format&fit=crop"
            alt="MacBook Air M3 màu bạc"
            loading="lazy"
            style="max-width: 100%; height: auto;">

        <figcaption>
            MacBook Air M3 - 31.990.000đ
        </figcaption>

    </figure>

    <br>

    <!-- Figure 3 -->
    <figure>

        <img
            src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=1200&auto=format&fit=crop"
            alt="iPad Pro màu Space Gray"
            loading="lazy"
            style="max-width: 100%; height: auto;">

        <figcaption>
            iPad Pro - 22.990.000đ
        </figcaption>

    </figure>

    <hr>

    <!-- YouTube -->

    <h2>Video giới thiệu YouTube</h2>

    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/TX9qSaGXFyg"
        title="YouTube video"
        allowfullscreen>
    </iframe>

    <hr>

    <!-- Video HTML5 -->

    <h2>Video sản phẩm</h2>

    <video
        controls
        width="600"
        poster="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop">

        <source
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            type="video/mp4">

        <source
            src="https://www.w3schools.com/html/mov_bbb.webm"
            type="video/webm">

        Trình duyệt không hỗ trợ video.

    </video>

    <hr>

    <!-- Audio -->

    <h2>Nhạc nền giới thiệu</h2>

    <audio controls>

        <source
            src="https://www.w3schools.com/html/horse.mp3"
            type="audio/mpeg">

        Trình duyệt không hỗ trợ audio.

    </audio>

    <hr>

    <!-- SVG -->

    <h2>Logo SVG</h2>

    <svg width="200" height="200">

        <!-- Hình tròn -->
        <circle
            cx="100"
            cy="100"
            r="80"
            fill="blue">
        </circle>

        <!-- Hình chữ nhật -->
        <rect
            x="70"
            y="70"
            width="60"
            height="60"
            fill="white">
        </rect>

    </svg>

</body>

</html>
