<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>

    <link rel="stylesheet" href="position.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            MyShop
        </div>

        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

    </header>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Danh mục</h2>

            <ul>
                <li>Điện thoại</li>
                <li>Laptop</li>
                <li>Tai nghe</li>
                <li>Đồng hồ</li>
                <li>Phụ kiện</li>
            </ul>

        </aside>

        <!-- CONTENT -->
        <main class="content">

            <!-- PRODUCT CARD -->
            <div class="product-card">

                <div class="badge">
                    HOT
                </div>

                <img src="https://via.placeholder.com/300x200"
                     alt="product">

                <h3>iPhone 15 Pro</h3>

                <p>
                    Điện thoại cao cấp với hiệu năng mạnh mẽ.
                </p>

                <button>Mua ngay</button>

            </div>

            <!-- LONG CONTENT -->
            <div class="long-content">

                <h2>Nội dung để scroll</h2>

                <p>
                    Scroll xuống để kiểm tra:
                </p>

                <ul>
                    <li>Header fixed</li>
                    <li>Sidebar sticky</li>
                    <li>Nút scroll top fixed</li>
                </ul>

                <div class="fake-content"></div>

            </div>

        </main>

    </div>

    <!-- SCROLL TOP BUTTON -->
    <button class="scroll-top">
        ↑
    </button>

</body>
</html>
